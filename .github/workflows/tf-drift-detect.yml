# .github/workflows/tf-drift-detect.yml
# Scheduled workflow. Runs nightly at 00:00 UTC.
# Detects drift between actual dev infrastructure and Terraform state.

name: Terraform Drift Detection

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  load-modules:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    outputs:
      modules: ${{ steps.read.outputs.modules }}
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.TF_EXEC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - id: read
        shell: bash
        run: |
          set -euo pipefail
          CATALOG="${{ github.workspace }}/connect-pbx/modules/dependency-order.json"
          HELPER="${{ github.workspace }}/connect-pbx/scripts/module_manifest.py"
          MANIFEST="${{ github.workspace }}/connect-pbx/environments/dev/deployment-manifest.json"
          STATE_BUCKET="${{ secrets.STATE_BUCKET }}"
          AWS_REGION="${{ secrets.AWS_REGION }}"

          mapfile -t ELIGIBLE_MODULES < <(
            python "${HELPER}" eligible-modules \
              --catalog "${CATALOG}" \
              --manifest "${MANIFEST}" \
              --action plan | tr -d '\r'
          )

          DEPLOYED_MODULES=()
          for MODULE_PATH in "${ELIGIBLE_MODULES[@]}"; do
            if [[ -z "${MODULE_PATH}" || "${MODULE_PATH}" == "modules/bootstrap" ]]; then
              continue
            fi

            STATE_KEY="$(python "${HELPER}" module-field --catalog "${CATALOG}" --module "${MODULE_PATH}" --field state_key | tr -d '\r')"
            WORKSPACE_SCOPED="$(python "${HELPER}" module-field --catalog "${CATALOG}" --module "${MODULE_PATH}" --field workspace_scoped | tr -d '\r')"
            STATE_OBJECT_KEY="${STATE_KEY}"
            if [[ "${WORKSPACE_SCOPED}" == "true" ]]; then
              STATE_OBJECT_KEY="env:/dev/${STATE_KEY}"
            fi

            if ! aws s3api head-object \
              --bucket "${STATE_BUCKET}" \
              --key "${STATE_OBJECT_KEY}" \
              --region "${AWS_REGION}" >/dev/null 2>&1; then
              echo "Skipping ${MODULE_PATH}: no state object at s3://${STATE_BUCKET}/${STATE_OBJECT_KEY}"
              continue
            fi

            STATE_FILE="$(mktemp)"
            aws s3 cp "s3://${STATE_BUCKET}/${STATE_OBJECT_KEY}" "${STATE_FILE}" --region "${AWS_REGION}" >/dev/null

            if ! python -c "import json, sys; doc=json.load(open(sys.argv[1], encoding='utf-8')); resources=doc.get('resources', []); has_root=any(r.get('mode', 'managed') == 'managed' for r in ((doc.get('values') or {}).get('root_module') or {}).get('resources', [])); has_nested=any(((child.get('resources') or []) and any(r.get('mode', 'managed') == 'managed' for r in child.get('resources', []))) for child in (((doc.get('values') or {}).get('root_module') or {}).get('child_modules', []))); ok=any(r.get('mode', 'managed') == 'managed' and r.get('instances') for r in resources) if resources else (has_root or has_nested); raise SystemExit(0 if ok else 1)" "${STATE_FILE}"; then
              rm -f "${STATE_FILE}"
              echo "Skipping ${MODULE_PATH}: state exists but contains no managed resources"
              continue
            fi

            rm -f "${STATE_FILE}"

            DEPLOYED_MODULES+=("${MODULE_PATH}")
          done

          MODULES="$(printf '%s\n' "${DEPLOYED_MODULES[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')"
          echo "modules=${MODULES}" >> $GITHUB_OUTPUT

  drift-detect:
    needs: load-modules
    runs-on: ubuntu-latest
    environment: dev
    env:
      TF_INPUT: "0"
      TF_VAR_state_bucket: ${{ secrets.STATE_BUCKET }}
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        module: ${{ fromJson(needs.load-modules.outputs.modules) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      - name: Resolve module metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          CATALOG="${{ github.workspace }}/connect-pbx/modules/dependency-order.json"
          HELPER="${{ github.workspace }}/connect-pbx/scripts/module_manifest.py"
          MODULE_PATH="${{ matrix.module }}"

          STATE_KEY="$(python "${HELPER}" module-field --catalog "${CATALOG}" --module "${MODULE_PATH}" --field state_key | tr -d '\r')"
          WORKSPACE_SCOPED="$(python "${HELPER}" module-field --catalog "${CATALOG}" --module "${MODULE_PATH}" --field workspace_scoped | tr -d '\r')"
          DOMAIN_TFVARS_NAME="$(python "${HELPER}" module-field --catalog "${CATALOG}" --module "${MODULE_PATH}" --field domain_tfvars | tr -d '\r')"
          WORKSPACE_NAME="default"
          if [ "${WORKSPACE_SCOPED}" = "true" ]; then
            WORKSPACE_NAME="dev"
          fi

          GLOBAL_TFVARS="${{ github.workspace }}/connect-pbx/environments/dev/global.tfvars"
          DOMAIN_TFVARS_PATH=""
          if [ -n "${DOMAIN_TFVARS_NAME}" ]; then
            DOMAIN_TFVARS_PATH="${{ github.workspace }}/connect-pbx/environments/dev/${DOMAIN_TFVARS_NAME}"
            if [ ! -f "${DOMAIN_TFVARS_PATH}" ]; then
              echo "Missing required tfvars file: ${DOMAIN_TFVARS_PATH}" >&2
              exit 1
            fi
          fi

          echo "state_key=${STATE_KEY}" >> "${GITHUB_OUTPUT}"
          echo "workspace_scoped=${WORKSPACE_SCOPED}" >> "${GITHUB_OUTPUT}"
          echo "workspace_name=${WORKSPACE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "global_tfvars=${GLOBAL_TFVARS}" >> "${GITHUB_OUTPUT}"
          echo "domain_tfvars_path=${DOMAIN_TFVARS_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.TF_EXEC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Read Terraform Version
        id: terraform-version
        shell: bash
        run: echo "version=$(tr -d '\r\n' < connect-pbx/.terraform-version)" >> "${GITHUB_OUTPUT}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ steps.terraform-version.outputs.version }}

      - name: Terraform Init
        working-directory: connect-pbx/${{ matrix.module }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.STATE_BUCKET }}" \
            -backend-config="key=${{ steps.metadata.outputs.state_key }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="kms_key_id=${{ secrets.ENV_KMS_KEY_ARN }}" \
            -backend-config="use_lockfile=true"

      - name: Select Workspace
        if: steps.metadata.outputs.workspace_scoped == 'true'
        working-directory: connect-pbx/${{ matrix.module }}
        run: terraform workspace select ${{ steps.metadata.outputs.workspace_name }} || terraform workspace new ${{ steps.metadata.outputs.workspace_name }}

      - name: Detect Drift
        id: drift
        working-directory: connect-pbx/${{ matrix.module }}
        shell: bash
        run: |
          set -euo pipefail
          PLAN_ARGS=("-var-file=${{ steps.metadata.outputs.global_tfvars }}")
          if [ -n "${{ steps.metadata.outputs.domain_tfvars_path }}" ]; then
            PLAN_ARGS+=("-var-file=${{ steps.metadata.outputs.domain_tfvars_path }}")
          fi

          EXIT_CODE=0
          terraform plan "${PLAN_ARGS[@]}" -input=false -detailed-exitcode -no-color 2>&1 | tee drift-plan-output.txt || EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT

      - name: Write Drift Result to S3
        if: always()
        working-directory: connect-pbx/${{ matrix.module }}
        shell: bash
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y/%m/%d)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EXIT_CODE="${{ steps.drift.outputs.exit_code }}"
          STATUS="clean"
          DRIFTED="false"
          if [[ "${EXIT_CODE}" == "2" ]]; then
            STATUS="drift"
            DRIFTED="true"
          elif [[ "${EXIT_CODE}" == "1" ]]; then
            STATUS="error"
          fi

          ERROR_SUMMARY="null"
          if [[ "${EXIT_CODE}" == "1" && -f drift-plan-output.txt ]]; then
            ERROR_SUMMARY="$(python -c "import json, pathlib; text = pathlib.Path('drift-plan-output.txt').read_text(encoding='utf-8', errors='replace'); text = text[-12000:]; print(json.dumps(text))")"
          fi

          MODULE_SLUG=$(echo "${{ matrix.module }}" | tr '/' '-')
          printf '{"timestamp":"%s","module":"%s","environment":"dev","status":"%s","drifted":%s,"exit_code":"%s","error_summary":%s}\n' \
            "${TIMESTAMP}" \
            "${{ matrix.module }}" \
            "${STATUS}" \
            "${DRIFTED}" \
            "${{ steps.drift.outputs.exit_code }}" \
            "${ERROR_SUMMARY}" \
            > drift-result.json
          aws s3 cp drift-result.json \
            "s3://${{ secrets.STATE_BUCKET }}/audit/drift/${DATE}/${MODULE_SLUG}-${{ github.run_id }}.json" \
            --sse aws:kms \
            --sse-kms-key-id "${{ secrets.ENV_KMS_KEY_ARN }}"

      - name: Alert on Drift
        if: steps.drift.outputs.exit_code == '2'
        run: |
          aws sns publish \
            --topic-arn "${{ secrets.SNS_ALERT_TOPIC_ARN }}" \
            --subject "DRIFT DETECTED: ${{ matrix.module }} in dev" \
            --message "Drift detected in ${{ matrix.module }} (dev). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
