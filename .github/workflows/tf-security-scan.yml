# .github/workflows/tf-security-scan.yml
# Reusable workflow. Caller: ci.yml
# Runs tfsec and checkov. Fails on HIGH or CRITICAL findings.

name: Terraform Security Scan

on:
  workflow_call:
    inputs:
      module_path:
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  tfsec:
    runs-on: ubuntu-latest
    if: inputs.module_path != 'modules/l1-phone-numbers'
    steps:
      - uses: actions/checkout@v5
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: connect-pbx/${{ inputs.module_path }}
          soft_fail: false
          format: lovely

  tfsec-phone-numbers-note:
    runs-on: ubuntu-latest
    if: inputs.module_path == 'modules/l1-phone-numbers'
    steps:
      - name: Explain tfsec skip for Terraform import blocks
        run: |
          echo "Skipping tfsec for modules/l1-phone-numbers."
          echo "Reason: this module uses Terraform import blocks and the pinned tfsec action cannot parse that syntax."

  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: connect-pbx/${{ inputs.module_path }}
          soft_fail: false
          output_format: cli
          download_external_modules: true
